<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Gradiente azul idêntico ao header do AuthCard -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Fundo quadrado com bordas arredondadas — igual ao estilo do ícone no card -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- Escudo branco centralizado no espaço 32x32.
       Path original do lucide-react (viewBox 24x24): M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z
       Transladado +4 em X e +4 em Y para centralizar no 32x32:            M16 26s8-4 8-10V9l-8-3-8 3v7c0 6 8 10 8 10z   -->
  <path
    d="M16 26s8-4 8-10V9l-8-3-8 3v7c0 6 8 10 8 10z"
    fill="white"
    stroke="white"
    stroke-width="0.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
